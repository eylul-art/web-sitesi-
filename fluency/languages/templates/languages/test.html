{% extends "base.html" %}

{% block content %}
<div class="container mt-5 text-white"> 
    <!-- Başlık views.py'den gelen dile göre dinamik değişir -->
    <h1 class="fw-bold text-center mb-5">{{ test_title }}</h1>

    <div class="card p-5 rounded-4 shadow-lg bg-white border-0 mb-5">
        <div style="color: #212529 !important;"> 
            <form method="post" action="{% url 'evaluate_test' lang_code=lang_code %}">
                {% csrf_token %}
                
                {% for question in questions %}
                <div class="mb-5">
                    <!-- Soru Metni -->
                    <h4 class="fw-bold mb-4" style="color: #212529 !important;">
                        {{ forloop.counter }}. {{ question.text }}
                    </h4>
                    
                    <div class="ms-3 mt-3">
                        <!-- Seçenek A -->
                        <div class="form-check mb-3 p-3 border rounded-3 shadow-sm option-container">
                            <input class="form-check-input ms-0 me-3" type="radio" name="question_{{ question.id }}" id="q{{ question.id }}a" value="A" required>
                            <label class="form-check-label fs-5 w-100 cursor-pointer" for="q{{ question.id }}a" style="color: #212529 !important;">
                                <strong>A)</strong> {{ question.option_a }}
                            </label>
                        </div>

                        <!-- Seçenek B -->
                        <div class="form-check mb-3 p-3 border rounded-3 shadow-sm option-container">
                            <input class="form-check-input ms-0 me-3" type="radio" name="question_{{ question.id }}" id="q{{ question.id }}b" value="B">
                            <label class="form-check-label fs-5 w-100 cursor-pointer" for="q{{ question.id }}b" style="color: #212529 !important;">
                                <strong>B)</strong> {{ question.option_b }}
                            </label>
                        </div>

                        <!-- Seçenek C -->
                        <div class="form-check mb-3 p-3 border rounded-3 shadow-sm option-container">
                            <input class="form-check-input ms-0 me-3" type="radio" name="question_{{ question.id }}" id="q{{ question.id }}c" value="C">
                            <label class="form-check-label fs-5 w-100 cursor-pointer" for="q{{ question.id }}c" style="color: #212529 !important;">
                                <strong>C)</strong> {{ question.option_c }}
                            </label>
                        </div>

                        <!-- Seçenek D -->
                        <div class="form-check mb-3 p-3 border rounded-3 shadow-sm option-container">
                            <input class="form-check-input ms-0 me-3" type="radio" name="question_{{ question.id }}" id="q{{ question.id }}d" value="D">
                            <label class="form-check-label fs-5 w-100 cursor-pointer" for="q{{ question.id }}d" style="color: #212529 !important;">
                                <strong>D)</strong> {{ question.option_d }}
                            </label>
                        </div>

                        <!-- Seçenek E (Yeni Eklenen 5. Şık) -->
                        <div class="form-check mb-3 p-3 border rounded-3 shadow-sm option-container">
                            <input class="form-check-input ms-0 me-3" type="radio" name="question_{{ question.id }}" id="q{{ question.id }}e" value="E">
                            <label class="form-check-label fs-5 w-100 cursor-pointer" for="q{{ question.id }}e" style="color: #212529 !important;">
                                <strong>E)</strong> {{ question.option_e }}
                            </label>
                        </div>
                    </div>
                </div>
                {% if not forloop.last %}
                <hr class="my-5 opacity-25" style="border-color: #212529;">
                {% endif %}
                {% endfor %}

                <!-- Dinamik Buton Metni -->
                <div class="text-center mt-5">
                    <button type="submit" class="btn btn-primary btn-lg px-5 rounded-pill fw-bold shadow-lg">
                        {% if lang_code == 'de' %}Test beenden
                        {% elif lang_code == 'en' %}Finish Test
                        {% elif lang_code == 'fr' %}Terminer le test
                        {% elif lang_code == 'kr' %}시험 종료
                        {% elif lang_code == 'ar' %}إنهاء الاختبار
                        {% elif lang_code == 'fa' %}پایان آزمون
                        {% else %}Testi Bitir{% endif %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .cursor-pointer { cursor: pointer; }
    .option-container {
        transition: all 0.2s ease;
        background-color: #fff;
    }
    .option-container:hover {
        background-color: #f8f9fa;
        border-color: #0d6efd !important;
        transform: translateX(5px);
    }
    .form-check-input:checked + .form-check-label {
        font-weight: bold;
        color: #0d6efd !important;
    }
</style>
{% endblock %}
