<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluency - Dil Öğrenmenin En Kolay Yolu | {% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* İstediğin Mor Arka Plan - Modern bir gradyan */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #fff;
        }

        .navbar {
            background-color: rgba(0, 0, 0, 0.2) !important;
            backdrop-filter: blur(5px);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -1px;
        }

        .navbar-brand span {
            color: #ffd700;
            /* 'cy' kısmı altın sarısı */
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        footer {
            background-color: rgba(0, 0, 0, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
        }

        /* Özel Mor Butonlar */
        .btn-fluency {
            background-color: #ffd700;
            color: #5a3791;
            font-weight: 600;
            border: none;
        }

        .btn-fluency:hover {
            background-color: #ffea00;
            color: #5a3791;
        }

        .btn-outline-fluency {
            border: 2px solid #fff;
            color: #fff;
            font-weight: 600;
        }

        .btn-outline-fluency:hover {
            background-color: #fff;
            color: #5a3791;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">Fluen<span>cy</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/login">Giriş</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-fluency btn-sm ms-lg-2 px-3" href="/register">Başla</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container main-content py-5">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="py-3 text-center">
        <div class="container">
            <small>&copy; 2024 Fluency App. MAT132 Projesi.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
