{% extends "base.html" %}
{% block content %}
<div class="card shadow-lg border-0 p-5 text-center"
    style="border-radius: 20px; width: 100%; max-width: 400px; color: #333;">
    <h2 class="fw-bold mb-4" style="color: #5a3791;">Tekrar Merhaba!</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3 text-start">
            <label class="form-label small fw-bold">Email / Kullanıcı Adı</label>
            <input type="text" name="username" class="form-control" style="border-radius: 10px;">
        </div>
        <div class="mb-4 text-start">
            <label class="form-label small fw-bold">Şifre</label>
            <input type="password" name="password" class="form-control" style="border-radius: 10px;">
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg shadow"
            style="background-color: #764ba2; border: none; border-radius: 10px;">Giriş Yap</button>
    </form>

    <div class="mt-3">
        <a href="{% url 'password_reset' %}" style="color: #764ba2; text-decoration: none;" class="small">Şifremi
            unuttum</a>
    </div>

    <p class="mt-4 small">Hesabın yok mu? <a href="/register" style="color: #764ba2;">Hemen Kaydol</a></p>
</div>
{% endblock %}
