{% extends "base.html" %}
{% block content %}
<div class="card shadow-lg border-0 p-5 text-center"
    style="border-radius: 20px; width: 100%; max-width: 450px; color: #333;">
    <h3 class="fw-bold mb-3" style="color: #5a3791;">Mail Gönderildi! 📧</h3>
    <p class="text-muted small mb-4">Eğer bu adresle kayıtlı bir hesabın varsa, şifreni sıfırlaman için bir bağlantı
        gönderdik. Lütfen e-posta kutunu (ve gereksiz/spam klasörünü) kontrol et.</p>
    <a href="{% url 'login' %}" class="btn btn-primary w-100 shadow"
        style="background-color: #764ba2; border: none; border-radius: 10px;">Giriş Sayfasına Dön</a>
</div>
{% endblock %}
