{% extends "base.html" %}
{% block content %}
<div class="card shadow-lg border-0 p-5 text-center"
    style="border-radius: 20px; width: 100%; max-width: 450px; color: #333;">
    <h3 class="fw-bold mb-3" style="color: #5a3791;">Şifreni Sıfırla</h3>
    <p class="text-muted small mb-4">Sana şifre yenileme bağlantısı gönderebilmemiz için kayıtlı e-posta adresini gir.
    </p>

    <form method="post">
        {% csrf_token %}
        <div class="mb-4 text-start">
            <label class="form-label small fw-bold">E-posta Adresi</label>
            <input type="email" name="email" class="form-control" style="border-radius: 10px;"
                placeholder="ornek@mail.com" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 shadow"
            style="background-color: #764ba2; border: none; border-radius: 10px;">Yenileme Linki Gönder</button>
    </form>

    <div class="mt-3">
        <a href="{% url 'login' %}" class="small text-muted">Vazgeç ve geri dön</a>
    </div>
</div>
{% endblock %}
